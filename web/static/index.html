<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🍔 Food Pilot — Scout</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1f242e;
    --accent: #ff7a45;
    --accent-2: #ffb86b;
    --text: #e8eaed;
    --muted: #98a0ad;
    --line: #2a2f3a;
    --good: #3ddc84;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #1b2030, var(--bg));
    color: var(--text);
    display: flex; flex-direction: column; align-items: center;
  }
  header {
    width: 100%; max-width: 820px; padding: 18px 20px 8px;
    display: flex; align-items: center; gap: 12px;
  }
  header h1 { font-size: 20px; margin: 0; font-weight: 700; }
  header .sub { color: var(--muted); font-size: 13px; }
  .chat {
    width: 100%; max-width: 820px; flex: 1;
    overflow-y: auto; padding: 12px 20px 24px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .msg { display: flex; gap: 10px; max-width: 92%; }
  .msg .avatar {
    width: 34px; height: 34px; border-radius: 50%; flex: 0 0 34px;
    display: grid; place-items: center; font-size: 18px;
    background: var(--panel-2); border: 1px solid var(--line);
  }
  .msg .bubble {
    background: var(--panel); border: 1px solid var(--line);
    padding: 12px 14px; border-radius: 14px; line-height: 1.5;
  }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.user .bubble {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #1a1206; border: none; font-weight: 600;
  }
  /* cards */
  .cards { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }
  .card {
    background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 12px; padding: 12px 14px; cursor: pointer;
    transition: border-color .15s, transform .05s, box-shadow .15s;
  }
  .card:hover { border-color: var(--accent); box-shadow: 0 4px 18px rgba(255,122,69,.12); }
  .card:active { transform: scale(.995); }
  .card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
  .card .title { font-weight: 700; font-size: 15px; display: flex; justify-content: space-between; gap: 10px; }
  .card .price { color: var(--accent-2); white-space: nowrap; }
  .card .meta { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .card .contact { color: var(--muted); font-size: 12.5px; margin-top: 6px; display: flex; flex-direction: column; gap: 2px; }
  /* deal controls */
  .deal-controls { display: flex; align-items: center; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
  .stepper { display: flex; align-items: center; gap: 8px; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 4px; }
  .stepper button { width: 30px; height: 30px; border-radius: 8px; border: none; background: var(--panel-2); color: var(--text); font-size: 18px; cursor: pointer; }
  .stepper button:hover { background: var(--accent); color: #1a1206; }
  .stepper .qty { min-width: 28px; text-align: center; font-weight: 700; }
  .btn {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #1a1206; border: none; border-radius: 10px; padding: 10px 18px;
    font-weight: 700; cursor: pointer; font-size: 14px;
  }
  .btn[disabled] { opacity: .45; cursor: not-allowed; }
  /* composer */
  .composer {
    width: 100%; max-width: 820px; padding: 12px 20px 22px;
    display: flex; gap: 10px;
  }
  .composer input, .composer .loc {
    background: var(--panel); border: 1px solid var(--line); color: var(--text);
    border-radius: 12px; padding: 12px 14px; font-size: 15px; outline: none;
  }
  .composer input { flex: 1; }
  .composer .loc { width: 170px; }
  .composer input:focus, .composer .loc:focus { border-color: var(--accent); }
  .send { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #1a1206; border: none; border-radius: 12px; padding: 0 20px; font-weight: 700; cursor: pointer; }
  .send[disabled] { opacity: .5; cursor: not-allowed; }
  /* typing dots */
  .typing { display: inline-flex; gap: 4px; }
  .typing span { width: 7px; height: 7px; background: var(--muted); border-radius: 50%; animation: blink 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100%{opacity:.25;} 40%{opacity:1;} }
  .summary { background: var(--panel-2); border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; margin-top: 8px; }
  .summary .row { display: flex; justify-content: space-between; gap: 12px; padding: 3px 0; }
  .summary .row b { color: var(--good); }
  /* RTL */
  [dir="rtl"] .msg.user { flex-direction: row; }
  [dir="rtl"] .card .title { flex-direction: row-reverse; }
</style>
</head>
<body>
  <header>
    <div style="font-size:26px">🍔</div>
    <div>
      <h1>Food Pilot — Scout</h1>
      <div class="sub">Tell me what you're craving · قُل لي إنت نفسك في إيه</div>
    </div>
  </header>

  <div class="chat" id="chat"></div>

  <div class="composer">
    <input id="loc" class="loc" value="Maadi, Cairo" title="Location" />
    <input id="query" placeholder="e.g. I'm craving a good burger / عايز كشري" autocomplete="off" />
    <button class="send" id="send">Send</button>
  </div>

<script>
const chat = document.getElementById("chat");
const queryEl = document.getElementById("query");
const locEl = document.getElementById("loc");
const sendBtn = document.getElementById("send");

let state = { session_id: null, lang: "en", rtl: false };

function scroll() { chat.scrollTop = chat.scrollHeight; }

function addMsg(text, who = "bot", rtl = false) {
  const msg = document.createElement("div");
  msg.className = "msg " + who;
  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.textContent = who === "user" ? "🧑" : "🤖";
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  if (rtl) bubble.setAttribute("dir", "rtl");
  bubble.textContent = text;
  msg.appendChild(avatar); msg.appendChild(bubble);
  chat.appendChild(msg); scroll();
  return bubble;
}

function addTyping() {
  const msg = document.createElement("div");
  msg.className = "msg bot"; msg.dataset.typing = "1";
  msg.innerHTML = `<div class="avatar">🤖</div><div class="bubble"><span class="typing"><span></span><span></span><span></span></span></div>`;
  chat.appendChild(msg); scroll();
  return msg;
}
function removeTyping(node) { if (node && node.parentNode) node.parentNode.removeChild(node); }

async function post(url, body) {
  const typing = addTyping();
  try {
    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      throw new Error(err.detail || "Request failed");
    }
    return await res.json();
  } finally {
    removeTyping(typing);
  }
}

function disableComposer(yes) {
  queryEl.disabled = yes; sendBtn.disabled = yes; locEl.disabled = yes;
}

/* ---------- restaurant step ---------- */
function renderRestaurants(data) {
  state.session_id = data.session_id;
  state.lang = data.lang; state.rtl = data.rtl;
  const bubble = addMsg(data.prompt, "bot", data.rtl);
  const cards = document.createElement("div"); cards.className = "cards";
  if (data.rtl) cards.setAttribute("dir", "rtl");
  data.options.forEach(o => {
    const card = document.createElement("div"); card.className = "card";
    card.innerHTML = `
      <div class="title"><span>${escapeHtml(o.name)}</span></div>
      <div class="meta">${escapeHtml(o.reason || "")}</div>
      <div class="contact">
        ${o.address ? `<div>📍 ${escapeHtml(o.address)}</div>` : ""}
        ${o.phone ? `<div>📞 ${escapeHtml(o.phone)}</div>` : ""}
      </div>`;
    card.onclick = async () => {
      lockCards(cards, card);
      addMsg(o.name, "user", state.rtl);
      const next = await post("/api/pick_restaurant", { session_id: state.session_id, index: o.index });
      route(next);
    };
    cards.appendChild(card);
  });
  bubble.appendChild(cards); scroll();
}

/* ---------- deal step ---------- */
function renderDeals(data) {
  const bubble = addMsg(data.prompt, "bot", data.rtl);
  const cards = document.createElement("div"); cards.className = "cards";
  if (data.rtl) cards.setAttribute("dir", "rtl");
  let chosen = null;

  data.options.forEach(o => {
    const card = document.createElement("div"); card.className = "card";
    card.innerHTML = `
      <div class="title"><span>${escapeHtml(o.item_name)}</span><span class="price">${escapeHtml(String(o.price))} ${escapeHtml(o.currency)}</span></div>
      ${o.deal_description ? `<div class="meta">${escapeHtml(o.deal_description)}</div>` : ""}`;
    card.onclick = () => {
      chosen = o;
      [...cards.querySelectorAll(".card")].forEach(c => c.classList.remove("selected"));
      card.classList.add("selected");
      confirmBtn.disabled = false;
    };
    cards.appendChild(card);
  });

  // controls: quantity stepper + confirm
  const controls = document.createElement("div"); controls.className = "deal-controls";
  if (data.rtl) controls.setAttribute("dir", "rtl");
  let qty = 1;
  const stepper = document.createElement("div"); stepper.className = "stepper";
  stepper.innerHTML = `<button type="button">−</button><span class="qty">1</span><button type="button">+</button>`;
  const [minus, , plus] = stepper.childNodes;
  const qtyEl = stepper.querySelector(".qty");
  minus.onclick = () => { qty = Math.max(1, qty - 1); qtyEl.textContent = qty; };
  plus.onclick = () => { qty = Math.min(99, qty + 1); qtyEl.textContent = qty; };

  const qtyLabel = document.createElement("span");
  qtyLabel.textContent = data.quantity_label + ":"; qtyLabel.style.color = "var(--muted)";

  const confirmBtn = document.createElement("button");
  confirmBtn.className = "btn"; confirmBtn.textContent = data.confirm_label;
  confirmBtn.disabled = true;
  confirmBtn.onclick = async () => {
    if (!chosen) return;
    confirmBtn.disabled = true;
    lockCards(cards, [...cards.querySelectorAll(".card")].find(c => c.classList.contains("selected")));
    minus.disabled = plus.disabled = true;
    addMsg(`${chosen.item_name} × ${qty}`, "user", state.rtl);
    const next = await post("/api/pick_deal", { session_id: state.session_id, index: chosen.index, quantity: qty });
    route(next);
  };

  controls.appendChild(qtyLabel); controls.appendChild(stepper); controls.appendChild(confirmBtn);
  bubble.appendChild(cards); bubble.appendChild(controls); scroll();
}

/* ---------- final ---------- */
function renderDone(data) {
  const bubble = addMsg(data.message, "bot", data.rtl);
  const s = data.summary;
  const box = document.createElement("div"); box.className = "summary";
  if (data.rtl) box.setAttribute("dir", "rtl");
  const rows = [
    ["🍽️", s.restaurant],
    ["📍", s.address],
    ["📞", s.phone],
    ["🧾", `${s.item} × ${s.quantity}`],
    ["💰", `${s.price} ${s.currency}`],
  ].filter(r => r[1]);
  box.innerHTML = rows.map(r => `<div class="row"><span>${r[0]}</span><b>${escapeHtml(String(r[1]))}</b></div>`).join("");
  bubble.appendChild(box); scroll();
  disableComposer(false); // allow a new search
}

function renderNoDeals(data) {
  addMsg(data.message, "bot", data.rtl);
  disableComposer(false);
}

function route(data) {
  switch (data.step) {
    case "select_restaurant": renderRestaurants(data); break;
    case "select_deal": renderDeals(data); break;
    case "no_deals": renderNoDeals(data); break;
    case "done": renderDone(data); break;
    default: addMsg("Unexpected response.", "bot");
  }
}

function lockCards(container, keep) {
  [...container.querySelectorAll(".card")].forEach(c => {
    c.style.pointerEvents = "none";
    if (c !== keep) c.style.opacity = ".5";
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));
}

async function start() {
  const q = queryEl.value.trim();
  if (!q) return;
  addMsg(q, "user");
  queryEl.value = "";
  disableComposer(true);
  try {
    const data = await post("/api/start", {
      query: q, location: locEl.value.trim() || "Maadi, Cairo",
    });
    route(data);
  } catch (e) {
    addMsg("⚠️ " + e.message, "bot");
    disableComposer(false);
  }
}

sendBtn.onclick = start;
queryEl.addEventListener("keydown", e => { if (e.key === "Enter") start(); });
</script>
</body>
</html>
